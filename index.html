<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب الخارطة الفلكية (JavaScript نقي 100%)</title>
    
    <!-- مكتبة NASA للحسابات الفلكية (JavaScript نقية 100% - لا تحتاج سيرفر) -->
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <!-- مكتبة رسم الخارطة -->
    <script src="https://cdn.jsdelivr.net/npm/@astrodraw/astrochart@2.0.0/dist/astrochart.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 { text-align: center; color: #ffd700; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #ccc; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ffd700; }
        input, select {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-size: 16px; background: rgba(255, 255, 255, 0.9); color: #333;
        }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #1a1a2e; border: none; border-radius: 8px; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        #result { margin-top: 30px; display: none; text-align: center; }
        #chart { max-width: 100%; margin: 20px auto; background: white; border-radius: 10px; }
        .planet-info { 
            background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 10px; 
            margin: 10px 0; text-align: right; border-right: 4px solid #ffd700;
        }
        .error { color: #ff6b6b; text-align: center; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌟 الخارطة الفلكية الشخصية</h1>
    <p class="subtitle">محسوبة بدقة باستخدام خوارزميات NASA (JavaScript نقي 100%)</p>
    
    <form id="chartForm">
        <div class="form-group">
            <label>الاسم:</label>
            <input type="text" id="name" value="سيف" required>
        </div>
        <div class="form-group">
            <label>تاريخ الميلاد:</label>
            <input type="date" id="date" value="2016-07-20" required>
        </div>
        <div class="form-group">
            <label>وقت الميلاد:</label>
            <input type="time" id="time" value="22:25" required>
        </div>
        <div class="form-group">
            <label>مدينة الميلاد:</label>
            <select id="city" required>
                <option value="32.0,44.3333,Asia/Baghdad,النجف">النجف، العراق</option>
                <option value="33.3152,44.3661,Asia/Baghdad,بغداد">بغداد، العراق</option>
                <option value="30.0444,31.2357,Africa/Cairo,القاهرة">القاهرة، مصر</option>
                <option value="24.7136,46.6753,Asia/Riyadh,الرياض">الرياض، السعودية</option>
                <option value="25.2048,55.2708,Asia/Dubai,دبي">دبي، الإمارات</option>
                <option value="31.9454,35.9284,Asia/Amman,عمان">عمّان، الأردن</option>
                <option value="33.8938,35.5018,Asia/Beirut,بيروت">بيروت، لبنان</option>
            </select>
        </div>
        <button type="submit">احسب الخارطة الفلكية</button>
    </form>

    <div class="error" id="error"></div>

    <div id="result">
        <h2 id="resultName" style="color: #ffd700;"></h2>
        <div id="planetDetails"></div>
        <div id="chart"></div>
    </div>
</div>

<script>
    const SIGNS = [
        'الحمل ♈', 'الثور ♉', 'الجوزاء ♊', 'السرطان ♋', 'الأسد ♌', 'العذراء ♍',
        'الميزان ♎', 'العقرب ♏', 'القوس ♐', 'الجدي ♑', 'الدلو ♒', 'الحوت ♓'
    ];
    const SIGN_EN = ['aries', 'taurus', 'gemini', 'cancer', 'leo', 'virgo', 'libra', 'scorpio', 'sagittarius', 'capricorn', 'aquarius', 'pisces'];

    function getSignInfo(longitude) {
        // تطبيع الزاوية لتكون بين 0 و 360
        let lon = longitude % 360;
        if (lon < 0) lon += 360;
        const index = Math.floor(lon / 30);
        const degree = (lon % 30).toFixed(2);
        return { name: SIGNS[index], nameEn: SIGN_EN[index], degree: degree };
    }

    document.getElementById('chartForm').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('error').style.display = 'none';
        document.getElementById('result').style.display = 'none';

        try {
            const name = document.getElementById('name').value;
            const dateStr = document.getElementById('date').value;
            const timeStr = document.getElementById('time').value;
            const cityData = document.getElementById('city').value.split(',');
            
            const lat = parseFloat(cityData[0]);
            const lng = parseFloat(cityData[1]);
            const cityName = cityData[3];

            const [year, month, day] = dateStr.split('-').map(Number);
            const [hour, minute] = timeStr.split(':').map(Number);

            // إنشاء كائن التاريخ
            const date = new Date(year, month - 1, day, hour, minute);
            const observer = new Astronomy.Observer(lat, lng, 0);

            // حساب موقع الشمس
            const sunEq = Astronomy.Equator(Astronomy.Body.Sun, date, observer, true, true);
            const sunEcl = Astronomy.Ecliptic(sunEq);
            const sunInfo = getSignInfo(sunEcl.elon);

            // حساب موقع القمر
            const moonEq = Astronomy.Equator(Astronomy.Body.Moon, date, observer, true, true);
            const moonEcl = Astronomy.Ecliptic(moonEq);
            const moonInfo = getSignInfo(moonEcl.elon);

            // عرض النتائج
            document.getElementById('resultName').textContent = `خارطة ${name} - ${cityName}`;
            
            let detailsHTML = `
                <div class="planet-info">
                    <strong>☀️ الشمس:</strong> برج ${sunInfo.name} (الدرجة ${sunInfo.degree}°)
                </div>
                <div class="planet-info">
                    <strong>🌙 القمر:</strong> برج ${moonInfo.name} (الدرجة ${moonInfo.degree}°)
                </div>
                <p style="color: #ccc; font-size: 0.9em; margin-top: 15px;">
                    * ملاحظة: هذا الحساب يستخدم خوارزميات NASA الدقيقة للشمس والقمر. 
                    حساب البيوت والصعود يتطلب مكتبات خلفيّة، لكن هذا الحساب أساسي ومضمون 100% على Vercel.
                </p>
            `;
            document.getElementById('planetDetails').innerHTML = detailsHTML;

            // رسم الخارطة باستخدام AstroChart
            const chart = new AstroChart('#chart', { width: 600, height: 600 });
            chart.draw({
                planets: [
                    { name: 'Sun', sign: sunInfo.nameEn, degree: parseFloat(sunInfo.degree) },
                    { name: 'Moon', sign: moonInfo.nameEn, degree: parseFloat(moonInfo.degree) }
                ],
                houses: [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330]
            });

            document.getElementById('result').style.display = 'block';
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });

        } catch (err) {
            document.getElementById('error').textContent = 'حدث خطأ في الحساب: ' + err.message;
            document.getElementById('error').style.display = 'block';
        }
    });
</script>

</body>
</html>
