// ═══════════════════════════════════════════════════════════

function calculateAngles(utcYear, utcMonth, utcDay, utcHour, utcMinute, lat, lng) {
    let y = utcYear, m = utcMonth;
    if (m <= 2) { y -= 1; m += 12; }
    const d = utcDay + (utcHour + utcMinute / 60) / 24;
    const A = Math.floor(y / 100);
    const B = 2 - A + Math.floor(A / 4);
    const jd = Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5;

    const T = (jd - 2451545.0) / 36525.0;
    let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T - (T * T * T) / 38710000;
    gmst = gmst % 360;
    if (gmst < 0) gmst += 360;

    let lst = (gmst + lng) % 360;
    if (lst < 0) lst += 360;

    const ramc = lst * Math.PI / 180;
    const eps = 23.439291 * Math.PI / 180;
    const phi = lat * Math.PI / 180;

    const numAsc = Math.cos(ramc);
    const denAsc = -(Math.sin(ramc) * Math.cos(eps) + Math.tan(phi) * Math.sin(eps));
    let asc = Math.atan2(numAsc, denAsc) * 180 / Math.PI;
    asc = asc % 360;
    if (asc < 0) asc += 360;

    const numMc = Math.sin(ramc);
    const denMc = Math.cos(ramc) * Math.cos(eps);
    let mc = Math.atan2(numMc, denMc) * 180 / Math.PI;
    mc = mc % 360;
    if (mc < 0) mc += 360;

    return { asc, mc, jd };
}

function getSign(longitude) {
    let lon = longitude % 360;
    if (lon < 0) lon += 360;
    const idx = Math.floor(lon / 30);
    const degree = (lon % 30).toFixed(2);
    return { name: SIGNS_AR[idx], degree: degree, index: idx };
}

function getHouse(planetLon, ascLon) {
    const houses = [];
    for (let i = 0; i < 12; i++) {
        houses.push((ascLon + i * 30) % 360);
    }
    let lon = planetLon % 360;
    if (lon < 0) lon += 360;
    for (let i = 0; i < 12; i++) {
        const next = houses[(i + 1) % 12];
        if (houses[i] <= lon && lon < next) return i + 1;
    }
    return 1;
}

        const cityData = document.getElementById('city').value.split(',');
        
        const lat = parseFloat(cityData[0]);
        const lng = parseFloat(cityData[1]);
        const cityName = cityData[2];
        
        const [yStr, mStr, dStr] = dateVal.split('-');
        const [hrStr, minStr] = timeVal.split(':');
        
        let utcYear = parseInt(yStr, 10);
        let utcMonth = parseInt(mStr, 10);
        let utcDay = parseInt(dStr, 10);
        let utcHour = parseInt(hrStr, 10);
        let utcMinute = parseInt(minStr, 10);

        // التوقيت الصيفي للعراق 1991 (UTC+4)
        utcHour -= 4;
        if (utcHour < 0) { utcHour += 24; utcDay -= 1; }

        const targetDate = new Date(Date.UTC(utcYear, utcMonth - 1, utcDay, utcHour, utcMinute, 0));
        const angles = calculateAngles(utcYear, utcMonth, utcDay, utcHour, utcMinute, lat, lng);

        const planets = [
            { key: 'sun', name: 'الشمس', emoji: '☀️', body: 'Sun' },
            { key: 'moon', name: 'القمر', emoji: '🌙', body: 'Moon' },
            { key: 'mercury', name: 'عطارد', emoji: '☿️', body: 'Mercury' },
            { key: 'venus', name: 'الزهرة', emoji: '♀️', body: 'Venus' },
            { key: 'mars', name: 'المريخ', emoji: '♂️', body: 'Mars' },
            { key: 'jupiter', name: 'المشتري', emoji: '♃', body: 'Jupiter' },
            { key: 'saturn', name: 'زحل', emoji: '♄', body: 'Saturn' }
        ];

        const chartData = {};
        let planetsHTML = '';

        planets.forEach(p => {
            const vec = Astronomy.GeoVector(Astronomy.Body[p.body], targetDate, true);
            const ecl = Astronomy.Ecliptic(vec);
            const sign = getSign(ecl.elon);
            const house = getHouse(ecl.elon, angles.asc);
            
            chartData[p.key] = { sign: sign, degree: parseFloat(sign.degree), house: house, longitude: parseFloat(ecl.elon.toFixed(2)) };

            planetsHTML += `
                <div class="planet-card">
                    <div class="planet-emoji">${p.emoji}</div>
                    <div>
                        <div class="planet-name">${p.name}</div>
                        <div class="planet-info">برج ${sign.name} | الدرجة ${sign.degree}° | البيت ${house}</div>
                    </div>
                </div>
            `;
        });

        chartData.ascendant = { sign: getSign(angles.asc), longitude: parseFloat(angles.asc.toFixed(2)) };
        chartData.midheaven = { sign: getSign(angles.mc), longitude: parseFloat(angles.mc.toFixed(2)) };

        const interpretation = buildInterpretation(chartData);
        const whatsappText = encodeURIComponent(`مرحباً، أريد طلب التقرير الفلكي الشامل والدقيق لـ ${name} (تاريخ الميلاد: ${dateVal})`);

        let html = `
            <div id="report-content">
                <h2 style="color:#ffd700; text-align:center; margin-bottom:10px;">✨ خارطة ${name} الفلكية</h2>
                <p style="text-align:center; color:#aaa; margin-bottom:5px;">📅 ${dateVal} | ⏰ ${timeVal} | 🌍 ${cityName}</p>
                <p style="text-align:center; color:#888; font-size:0.85em; margin-bottom:25px;">الإحداثيات: ${lat}°N, ${lng}°E</p>
                
                <div class="report-section">
                    <h2>🪐 مواقع الكواكب</h2>
                    ${planetsHTML}
                    <div class="planet-card angle-card">
                        <div class="planet-emoji">⬆️</div>
                        <div><div class="planet-name">الطالع (Ascendant)</div><div class="planet-info">برج ${chartData.ascendant.sign.name} | الدرجة ${chartData.ascendant.sign.degree}°</div></div>
                    </div>
                    <div class="planet-card angle-card">
                        <div class="planet-emoji">🔝</div>
                        <div><div class="planet-name">وسط السماء (MC)</div><div class="planet-info">برج ${chartData.midheaven.sign.name} | الدرجة ${chartData.midheaven.sign.degree}°</div></div>
                    </div>
                </div>
                ${interpretation}
            </div>

            <div class="action-buttons">
                <button class="btn-pdf" onclick="downloadPDF('${name}', '${dateVal}')">📄 تحميل التقرير PDF</button>
                <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${whatsappText}" target="_blank" class="btn-whatsapp">💬 احصل على تحليل أعمق عبر واتساب</a>
            </div>

            <div class="accuracy-note">
                🔬 الحسابات بمعايير ناسا (Astronomy Engine) | دقة 0.01° | متطابق مع Swiss Ephemeris
            </div>
        `;

        resultDiv.innerHTML = html;
        resultDiv.style.display = 'block';
        resultDiv.scrollIntoView({ behavior: 'smooth' });

    } catch (err) {
        errorBox.innerHTML = `<strong>⚠️ خطأ:</strong><br>${err.message}`;
        errorBox.style.display = 'block';
    } finally {
        loadingDiv.style.display = 'none';
        submitBtn.disabled = false;
    }
});

function downloadPDF(name, date) {
    const element = document.getElementById('report-content');
    const opt = {
        margin: [0.5, 0.5, 0.5, 0.5],
        filename: `خارطة-${name}-${date}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
}
</script>
</body>
</html>
