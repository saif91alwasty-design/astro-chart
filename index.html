<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب الخارطة الفلكية (JavaScript نقي 100%)</title>

    <!-- مكتبة NASA للحسابات الفلكية (JavaScript نقية 100%) -->
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <!-- مكتبة رسم الخارطة -->
    <script src="https://cdn.jsdelivr.net/npm/@astrodraw/astrochart@2.0.0/dist/astrochart.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 { text-align: center; color: #ffd700; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #ccc; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ffd700; }
        input, select {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-size: 16px; background: rgba(255, 255, 255, 0.9); color: #333;
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #1a1a2e; border: none; border-radius: 8px; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #result { margin-top: 30px; display: none; text-align: center; }
        #chart { max-width: 100%; margin: 20px auto; background: white; border-radius: 10px; padding: 10px; }
        .planet-info { 
            background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 10px; 
            margin: 10px 0; text-align: right; border-right: 4px solid #ffd700;
        }
        .error { 
            color: #ff6b6b; background: rgba(255, 0, 0, 0.1); padding: 15px; 
            border-radius: 8px; text-align: center; margin-top: 20px; display: none; 
            border: 1px solid #ff6b6b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌟 الخارطة الفلكية الشخصية</h1>
    <p class="subtitle">محسوبة بدقة باستخدام خوارزميات NASA (JavaScript نقي 100%)</p>

    <form id="chartForm">
        <div class="form-group">
            <label>الاسم:</label>
            <input type="text" id="name" value="سيف" required>
        </div>
        <div class="form-group">
            <label>تاريخ الميلاد:</label>
            <input type="date" id="date" value="2016-07-20" required>
        </div>
        <div class="form-group">
            <label>وقت الميلاد:</label>
            <input type="time" id="time" value="22:25" required>
        </div>
        <div class="form-group">
            <label>مدينة الميلاد:</label>
            <select id="city" required>
                <option value="32.0,44.3333,النجف">النجف، العراق</option>
                <option value="33.3152,44.3661,بغداد">بغداد، العراق</option>
                <option value="30.0444,31.2357,القاهرة">القاهرة، مصر</option>
                <option value="24.7136,46.6753,الرياض">الرياض، السعودية</option>
                <option value="25.2048,55.2708,دبي">دبي، الإمارات</option>
                <option value="31.9454,35.9284,عمان">عمّان، الأردن</option>
                <option value="33.8938,35.5018,بيروت">بيروت، لبنان</option>
            </select>
        </div>
        <button type="submit" id="submitBtn">احسب الخارطة الفلكية</button>
    </form>

    <div class="error" id="error"></div>

    <div id="result">
        <h2 id="resultName" style="color: #ffd700;"></h2>
        <div id="planetDetails"></div>
        <div id="chart"></div>
    </div>
</div>

<script>
    const SIGNS = [
        'الحمل ♈', 'الثور ♉', 'الجوزاء ♊', 'السرطان ♋', 'الأسد ♌', 'العذراء ♍',
        'الميزان ♎', 'العقرب ♏', 'القوس ♐', 'الجدي ♑', 'الدلو ♒', 'الحوت ♓'
    ];
    const SIGN_EN = ['aries', 'taurus', 'gemini', 'cancer', 'leo', 'virgo', 'libra', 'scorpio', 'sagittarius', 'capricorn', 'aquarius', 'pisces'];

    function getSignInfo(longitude) {
        let lon = longitude % 360;
        if (lon < 0) lon += 360;
        const index = Math.floor(lon / 30);
        const degree = (lon % 30).toFixed(2);
        return { name: SIGNS[index], nameEn: SIGN_EN[index], degree: degree };
    }

    document.getElementById('chartForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const errorDiv = document.getElementById('error');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');

        errorDiv.style.display = 'none';
        resultDiv.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'جاري الحساب...';

        try {
            const name = document.getElementById('name').value.trim();
            const dateInput = document.getElementById('date').value;
            const timeInput = document.getElementById('time').value;
            const cityData = document.getElementById('city').value.split(',');

            if (!dateInput || !timeInput) {
                throw new Error("يرجى إدخال التاريخ والوقت بشكل صحيح.");
            }

            const lat = parseFloat(cityData[0]);
            const lng = parseFloat(cityData[1]);
            const cityName = cityData[2];

            // ✅ الحل: تحويل التاريخ والوقت إلى UTC يدوياً لتجنب مشاكل المنطقة الزمنية
            const [year, month, day] = dateInput.split('-').map(Number);
            const [hour, minute] = timeInput.split(':').map(Number);

            // التحقق من صحة القيم
            if (isNaN(year) || isNaN(month) || isNaN(day) || isNaN(hour) || isNaN(minute)) {
                throw new Error("تنسيق التاريخ أو الوقت غير صالح. يرجى التأكد من إدخالهما بشكل صحيح.");
            }

            // إنشاء التاريخ بصيغة UTC (شهر في JavaScript يبدأ من 0)
            const date = new Date(Date.UTC(year, month - 1, day, hour, minute, 0));

            // التحقق من صحة التاريخ
            if (isNaN(date.getTime())) {
                throw new Error("التاريخ المدخل غير صالح.");
            }

            const observer = new Astronomy.Observer(lat, lng, 0);

            // حساب مواقع الكواكب
            const sunEq = Astronomy.Equator(Astronomy.Body.Sun, date, observer, true, true);
            const sunEcl = Astronomy.Ecliptic(sunEq);
            const sunInfo = getSignInfo(sunEcl.elon);

            const moonEq = Astronomy.Equator(Astronomy.Body.Moon, date, observer, true, true);
            const moonEcl = Astronomy.Ecliptic(moonEq);
            const moonInfo = getSignInfo(moonEcl.elon);

            const mercuryEq = Astronomy.Equator(Astronomy.Body.Mercury, date, observer, true, true);
            const mercuryEcl = Astronomy.Ecliptic(mercuryEq);
            const mercuryInfo = getSignInfo(mercuryEcl.elon);

            const venusEq = Astronomy.Equator(Astronomy.Body.Venus, date, observer, true, true);
            const venusEcl = Astronomy.Ecliptic(venusEq);
            const venusInfo = getSignInfo(venusEcl.elon);

            // عرض النتائج
            document.getElementById('resultName').textContent = `خارطة ${name} - ${cityName}`;

            let detailsHTML = `
                <div class="planet-info"><strong>☀️ الشمس:</strong> برج ${sunInfo.name} (الدرجة ${sunInfo.degree}°)</div>
                <div class="planet-info"><strong>🌙 القمر:</strong> برج ${moonInfo.name} (الدرجة ${moonInfo.degree}°)</div>
                <div class="planet-info"><strong>☿️ عطارد:</strong> برج ${mercuryInfo.name} (الدرجة ${mercuryInfo.degree}°)</div>
                <div class="planet-info"><strong>♀️ الزهرة:</strong> برج ${venusInfo.name} (الدرجة ${venusInfo.degree}°)</div>
                <p style="color: #ccc; font-size: 0.9em; margin-top: 15px;">
                    * تم الحساب بنجاح باستخدام خوارزميات NASA الفلكية الدقيقة.
                </p>
            `;
            document.getElementById('planetDetails').innerHTML = detailsHTML;

            // رسم الخارطة
            const chart = new AstroChart('#chart', { width: 600, height: 600 });
            chart.draw({
                planets: [
                    { name: 'Sun', sign: sunInfo.nameEn, degree: parseFloat(sunInfo.degree) },
                    { name: 'Moon', sign: moonInfo.nameEn, degree: parseFloat(moonInfo.degree) },
                    { name: 'Mercury', sign: mercuryInfo.nameEn, degree: parseFloat(mercuryInfo.degree) },
                    { name: 'Venus', sign: venusInfo.nameEn, degree: parseFloat(venusInfo.degree) }
                ],
                houses: [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330]
            });

            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth' });

        } catch (err) {
            console.error(err);
            errorDiv.textContent = '⚠️ ' + err.message;
            errorDiv.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'احسب الخارطة الفلكية';
        }
    });
</script>

</body>
</html>
