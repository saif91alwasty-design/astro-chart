<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 خريطتي</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
            color: white; min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 700px; margin: 0 auto; background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px); padding: 30px; border-radius: 20px;
        }
        h1 { text-align: center; color: #ffd700; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 25px; font-size: 0.9em; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #ffd700; font-weight: bold; }
        input, select {
            width: 100%; padding: 12px; border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px; font-size: 16px; background: rgba(255,255,255,0.1); color: white;
        }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #ffd700, #ff9500);
            color: #1a1a2e; border: none; border-radius: 10px; font-size: 18px;
            font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .error-box {
            background: rgba(255,0,0,0.2); border: 1px solid #ff4444; color: #ff8888;
            padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; display: none;
        }
        #result { margin-top: 30px; display: none; }
        .planet-card {
            background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0;
            border-radius: 10px; border-right: 4px solid #ffd700; display: flex; align-items: center; gap: 15px;
        }
        .planet-emoji { font-size: 2em; }
        .planet-name { font-weight: bold; color: #ffd700; font-size: 1.1em; }
        .planet-info { color: #ddd; }
        .special-card { border-right-color: #ff6b6b !important; background: rgba(255,107,107,0.1) !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌙 خريطتي</h1>
    <p class="subtitle">اكتشف أسرار شخصيتك من خلال مواقع الكواكب عند ميلادك</p>
    
    <form id="chartForm">
        <div class="form-group">
            <label>الاسم:</label>
            <input type="text" id="name" value="سيف" required>
        </div>
        <div class="form-group">
            <label>تاريخ الميلاد:</label>
            <input type="date" id="date" value="2016-07-20" required>
        </div>
        <div class="form-group">
            <label>وقت الميلاد:</label>
            <input type="time" id="time" value="22:25" required>
        </div>
        <div class="form-group">
            <label>مدينة الميلاد:</label>
            <select id="city" required>
                <option value="32.0,44.3333,النجف">النجف، العراق</option>
                <option value="33.3152,44.3661,بغداد">بغداد، العراق</option>
                <option value="30.0444,31.2357,القاهرة">القاهرة، مصر</option>
                <option value="24.7136,46.6753,الرياض">الرياض، السعودية</option>
                <option value="25.2048,55.2708,دبي">دبي، الإمارات</option>
            </select>
        </div>
        <button type="submit" id="submitBtn">✨ احسب الخارطة الفلكية</button>
    </form>

    <div class="error-box" id="errorBox"></div>
    <div id="result"></div>
</div>

<script>
document.getElementById('chartForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const errorBox = document.getElementById('errorBox');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');
    
    errorBox.style.display = 'none';
    resultDiv.style.display = 'none';
    submitBtn.disabled = true;
    
    try {
        const name = document.getElementById('name').value || 'مستخدم';
        const dateVal = document.getElementById('date').value;
        const timeVal = document.getElementById('time').value;
        const cityVal = document.getElementById('city').value;
        
        const cityData = cityVal.split(',');
        const y = parseInt(dateVal.split('-')[0], 10);
        const m = parseInt(dateVal.split('-')[1], 10);
        const d = parseInt(dateVal.split('-')[2], 10);
        const hr = parseInt(timeVal.split(':')[0], 10);
        const min = parseInt(timeVal.split(':')[1], 10);
        const cityName = cityData[2];

        const targetDate = new Date(Date.UTC(y, m - 1, d, hr, min, 0, 0));
        
        let html = `<h2 style="color:#ffd700; text-align:center; margin-bottom:20px;">✨ خارطة ${name}</h2>`;
        html += `<p style="text-align:center; color:#aaa; margin-bottom:20px;">📅 ${dateVal} | ⏰ ${timeVal} | 🌍 ${cityName}</p>`;

        const PLANETS = [
            { key: 'Sun', name: 'الشمس', emoji: '☀️' },
            { key: 'Moon', name: 'القمر', emoji: '🌙' },
            { key: 'Mercury', name: 'عطارد', emoji: '☿️' },
            { key: 'Venus', name: 'الزهرة', emoji: '♀️' },
            { key: 'Mars', name: 'المريخ', emoji: '♂️' },
            { key: 'Jupiter', name: 'المشتري', emoji: '♃' },
            { key: 'Saturn', name: 'زحل', emoji: '♄' }
        ];
        const SIGNS_AR = ['الحمل', 'الثور', 'الجوزاء', 'السرطان', 'الأسد', 'العذراء', 'الميزان', 'العقرب', 'القوس', 'الجدي', 'الدلو', 'الحوت'];

        // 🎯 الحل السحري: استخدام EclipticGeo مباشرة (بدون Equator وبدون Observer)
        for (let i = 0; i < PLANETS.length; i++) {
            const p = PLANETS[i];
            
            // استخدام EclipticGeo - تحسب الإحداثيات الكسوفية المركزية الأرضية مباشرة
            const ecl = Astronomy.EclipticGeo(Astronomy.Body[p.key], targetDate);
            
            let lon = ecl.elon % 360;
            if (lon < 0) lon += 360;
            const signIndex = Math.floor(lon / 30);
            const degree = (lon % 30).toFixed(2);
            const signName = SIGNS_AR[signIndex];
            
            html += `
                <div class="planet-card">
                    <div class="planet-emoji">${p.emoji}</div>
                    <div>
                        <div class="planet-name">${p.name}</div>
                        <div class="planet-info">♈ برج ${signName} |  الدرجة ${degree}°</div>
                    </div>
                </div>
            `;
        }
        
        // حساب تقريبي للطالع
        const sunEcl = Astronomy.EclipticGeo(Astronomy.Body.Sun, targetDate);
        const ascIndex = (Math.floor(sunEcl.elon / 30) + Math.floor(hr / 2)) % 12;
        const ascName = SIGNS_AR[ascIndex >= 0 ? ascIndex : ascIndex + 12];
        
        html += `
            <div class="planet-card special-card">
                <div class="planet-emoji">⬆️</div>
                <div>
                    <div class="planet-name">الطالع (Ascendant) - تقريبي</div>
                    <div class="planet-info">♈ برج ${ascName}</div>
                </div>
            </div>
        `;

        resultDiv.innerHTML = html;
        resultDiv.style.display = 'block';
        resultDiv.scrollIntoView({ behavior: 'smooth' });

    } catch (err) {
        const errMsg = (typeof err === 'object' && err !== null && err.message) ? err.message : String(err);
        errorBox.innerHTML = `<strong>⚠️ خطأ:</strong><br>${errMsg}`;
        errorBox.style.display = 'block';
    } finally {
        submitBtn.disabled = false;
    }
});
</script>

</body>
</html>
