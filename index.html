<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> خريطتي</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
            color: white; min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 700px; margin: 0 auto; background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px); padding: 30px; border-radius: 20px;
        }
        h1 { text-align: center; color: #ffd700; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #ffd700; font-weight: bold; }
        input, select {
            width: 100%; padding: 12px; border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px; font-size: 16px; background: rgba(255,255,255,0.1); color: white;
        }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #ffd700, #ff9500);
            color: #1a1a2e; border: none; border-radius: 10px; font-size: 18px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* المربع الأسود التشخيصي - يظهر دائماً عند الخطأ */
        .debug-box {
            background: #000; border: 2px solid #ff0000; border-radius: 10px;
            padding: 15px; margin-top: 20px; font-family: monospace; 
            font-size: 0.75em; color: #00ff00; direction: ltr; text-align: left;
            display: none; white-space: pre-wrap; max-height: 300px; overflow-y: auto;
        }
        .error-box {
            background: rgba(255,0,0,0.2); border: 1px solid #ff4444; color: #ff8888;
            padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; display: none;
        }
        #result { margin-top: 30px; display: none; }
        .planet-card {
            background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0;
            border-radius: 10px; border-right: 4px solid #ffd700;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌙 خريطتي</h1>
    
    <form id="chartForm">
        <div class="form-group">
            <label>الاسم:</label>
            <input type="text" id="name" value="سيف" required>
        </div>
        <div class="form-group">
            <label>تاريخ الميلاد:</label>
            <input type="date" id="date" value="2016-07-20" required>
        </div>
        <div class="form-group">
            <label>وقت الميلاد:</label>
            <input type="time" id="time" value="22:25" required>
        </div>
        <div class="form-group">
            <label>مدينة الميلاد:</label>
            <select id="city" required>
                <option value="32.0,44.3333,النجف">النجف، العراق</option>
                <option value="33.3152,44.3661,بغداد">بغداد، العراق</option>
                <option value="30.0444,31.2357,القاهرة">القاهرة، مصر</option>
                <option value="24.7136,46.6753,الرياض">الرياض، السعودية</option>
            </select>
        </div>
        <button type="submit" id="submitBtn">احسب الخارطة</button>
    </form>

    <div class="error-box" id="errorBox"></div>
    <div class="debug-box" id="debugBox"></div>
    <div id="result"></div>
</div>

<script>
const SIGNS_AR = ['الحمل', 'الثور', 'الجوزاء', 'السرطان', 'الأسد', 'العذراء', 'الميزان', 'العقرب', 'القوس', 'الجدي', 'الدلو', 'الحوت'];

document.getElementById('chartForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const errorBox = document.getElementById('errorBox');
    const debugBox = document.getElementById('debugBox');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');
    
    errorBox.style.display = 'none';
    debugBox.style.display = 'none';
    resultDiv.style.display = 'none';
    submitBtn.disabled = true;
    
    let debugLog = '=== DEBUG LOG ===\n';
    
    try {
        // الخطوة 1: قراءة القيم
        debugLog += 'Step 1: Reading values...\n';
        const name = document.getElementById('name').value;
        const dateVal = document.getElementById('date').value;
        const timeVal = document.getElementById('time').value;
        const cityData = document.getElementById('city').value.split(',');
        
        debugLog += `Date: "${dateVal}"\nTime: "${timeVal}"\nCity: ${cityData[2]}\n`;
        
        // الخطوة 2: تحليل الأرقام
        debugLog += '\nStep 2: Parsing numbers...\n';
        const [yStr, mStr, dStr] = dateVal.split('-');
        const [hrStr, minStr] = timeVal.split(':');
        
        const y = parseInt(yStr, 10);
        const m = parseInt(mStr, 10);
        const d = parseInt(dStr, 10);
        const hr = parseInt(hrStr, 10);
        const min = parseInt(minStr, 10);
        const lat = parseFloat(cityData[0]);
        const lng = parseFloat(cityData[1]);
        
        debugLog += `Y:${y} M:${m} D:${d} HR:${hr} MIN:${min}\n`;
        debugLog += `Lat:${lat} Lng:${lng}\n`;
        
        // التحقق من الصلاحية
        if ([y, m, d, hr, min, lat, lng].some(isNaN)) {
            throw new Error('Invalid number detected');
        }
        
        // الخطوة 3: إنشاء التاريخ
        debugLog += '\nStep 3: Creating Date object...\n';
        const targetDate = new Date(Date.UTC(y, m - 1, d, hr, min, 0, 0));
        debugLog += `Date Object: ${targetDate}\n`;
        debugLog += `Date Time: ${targetDate.getTime()}\n`;
        
        if (isNaN(targetDate.getTime())) {
            throw new Error('Invalid Date object created');
        }
        
        // الخطوة 4: إنشاء الراصد
        debugLog += '\nStep 4: Creating Observer...\n';
        const observer = new Astronomy.Observer(lat, lng, 0);
        debugLog += `Observer created successfully\n`;
        
        // الخطوة 5: اختبار المكتبة
        debugLog += '\nStep 5: Testing astronomy library...\n';
        debugLog += `Astronomy object: ${typeof Astronomy}\n`;
        debugLog += `Astronomy.Equator: ${typeof Astronomy.Equator}\n`;
        debugLog += `Astronomy.Body.Sun: ${Astronomy.Body.Sun}\n`;
        
        // الخطوة 6: الحساب الفعلي
        debugLog += '\nStep 6: Calculating Sun position...\n';
        let eq, ecl, sign;
        
        try {
            eq = Astronomy.Equator(Astronomy.Body.Sun, targetDate, observer, true, true);
            debugLog += `Equator result: ${JSON.stringify(eq, null, 2)}\n`;
            
            ecl = Astronomy.Ecliptic(eq);
            debugLog += `Ecliptic result: ${JSON.stringify(ecl, null, 2)}\n`;
            
            if (!ecl || typeof ecl.elon === 'undefined') {
                throw new Error('Ecliptic.elon is undefined');
            }
            
            // الخطوة 7: حساب البرج
            debugLog += '\nStep 7: Calculating zodiac sign...\n';
            let lon = ecl.elon % 360;
            if (lon < 0) lon += 360;
            const signIndex = Math.floor(lon / 30);
            const degree = (lon % 30).toFixed(2);
            sign = SIGNS_AR[signIndex];
            
            debugLog += `Longitude: ${lon}\nSign Index: ${signIndex}\nSign: ${sign}\nDegree: ${degree}\n`;
            
            // الخطوة 8: عرض النتائج
            debugLog += '\nStep 8: Displaying results...\n';
            let html = `<h2 style="color:#ffd700;text-align:center;margin-bottom:20px;">خارطة ${name}</h2>`;
            html += `<div class="planet-card"><strong>☀️ الشمس:</strong> برج ${sign} (${degree}°)</div>`;
            
            resultDiv.innerHTML = html;
            resultDiv.style.display = 'block';
            debugLog += '\n=== SUCCESS ===\n';
            
        } catch (astroErr) {
            debugLog += `\nASTRO ERROR: ${astroErr.message}\n`;
            debugLog += `Stack: ${astroErr.stack}\n`;
            throw astroErr;
        }
        
    } catch (err) {
        debugLog += `\nFATAL ERROR: ${err.message}\n`;
        debugLog += `Stack: ${err.stack}\n`;
        
        errorBox.innerHTML = `<strong>⚠️ خطأ:</strong> ${err.message}`;
        errorBox.style.display = 'block';
        
        debugBox.textContent = debugLog;
        debugBox.style.display = 'block';
        debugBox.scrollIntoView({ behavior: 'smooth' });
    } finally {
        submitBtn.disabled = false;
    }
});
</script>

</body>
</html>
