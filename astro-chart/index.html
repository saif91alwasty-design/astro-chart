<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب الخارطة الفلكية (JavaScript نقي 100%)</title>

    <!-- مكتبة NASA للحسابات الفلكية (JavaScript نقية 100%) -->
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 { text-align: center; color: #ffd700; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #ccc; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ffd700; }
        input, select {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-size: 16px; background: rgba(255, 255, 255, 0.9); color: #333;
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #1a1a2e; border: none; border-radius: 8px; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #result { margin-top: 30px; display: none; text-align: center; }
        #chart-container { 
            max-width: 100%; margin: 20px auto; background: #1a1a2e; 
            border-radius: 10px; padding: 10px; border: 2px solid #ffd700;
        }
        .planet-info { 
            background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 10px; 
            margin: 10px 0; text-align: right; border-right: 4px solid #ffd700;
        }
        .error { 
            color: #ff6b6b; background: rgba(255, 0, 0, 0.1); padding: 15px; 
            border-radius: 8px; text-align: center; margin-top: 20px; display: none; 
            border: 1px solid #ff6b6b;
        }
        .zodiac-wheel { background: #0d0d1a; border-radius: 50%; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌟 الخارطة الفلكية الشخصية</h1>
    <p class="subtitle">محسوبة بدقة باستخدام خوارزميات NASA (JavaScript نقي 100%)</p>

    <form id="chartForm">
        <div class="form-group">
            <label>الاسم:</label>
            <input type="text" id="name" value="سيف" required>
        </div>
        <div class="form-group">
            <label>تاريخ الميلاد:</label>
            <input type="date" id="date" value="2016-07-20" required>
        </div>
        <div class="form-group">
            <label>وقت الميلاد:</label>
            <input type="time" id="time" value="22:25" required>
        </div>
        <div class="form-group">
            <label>مدينة الميلاد:</label>
            <select id="city" required>
                <option value="32.0,44.3333,النجف">النجف، العراق</option>
                <option value="33.3152,44.3661,بغداد">بغداد، العراق</option>
                <option value="30.0444,31.2357,القاهرة">القاهرة، مصر</option>
                <option value="24.7136,46.6753,الرياض">الرياض، السعودية</option>
                <option value="25.2048,55.2708,دبي">دبي، الإمارات</option>
                <option value="31.9454,35.9284,عمان">عمّان، الأردن</option>
                <option value="33.8938,35.5018,بيروت">بيروت، لبنان</option>
            </select>
        </div>
        <button type="submit" id="submitBtn">احسب الخارطة الفلكية</button>
    </form>

    <div class="error" id="error"></div>

    <div id="result">
        <h2 id="resultName" style="color: #ffd700;"></h2>
        <div id="planetDetails"></div>
        <div id="chart-container">
            <svg id="astroChart" width="600" height="600" viewBox="0 0 600 600" class="zodiac-wheel"></svg>
        </div>
    </div>
</div>

<script>
    const SIGNS = [
        'الحمل ♈', 'الثور ♉', 'الجوزاء ♊', 'السرطان ♋', 'الأسد ♌', 'العذراء ♍',
        'الميزان ♎', 'العقرب ♏', 'القوس ♐', 'الجدي ♑', 'الدلو ♒', 'الحوت ♓'
    ];
    const SIGN_EN = ['aries', 'taurus', 'gemini', 'cancer', 'leo', 'virgo', 'libra', 'scorpio', 'sagittarius', 'capricorn', 'aquarius', 'pisces'];
    const SIGN_SYMBOLS = ['♈', '♉', '♊', '♋', '♌', '♍', '♎', '♏', '♐', '♑', '♒', '♓'];
    const PLANET_SYMBOLS = { 'Sun': '☉', 'Moon': '☽', 'Mercury': '☿', 'Venus': '♀', 'Mars': '♂', 'Jupiter': '♃', 'Saturn': '♄' };

    function getSignInfo(longitude) {
        let lon = longitude % 360;
        if (lon < 0) lon += 360;
        const index = Math.floor(lon / 30);
        const degree = (lon % 30).toFixed(2);
        return { name: SIGNS[index], nameEn: SIGN_EN[index], degree: degree, index: index };
    }

    function drawAstroChart(planets) {
        const svg = document.getElementById('astroChart');
        svg.innerHTML = '';
        const cx = 300, cy = 300, r = 250;
        const innerR = 180;

        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        bg.setAttribute('cx', cx); bg.setAttribute('cy', cy); bg.setAttribute('r', r);
        bg.setAttribute('fill', '#0d0d1a'); bg.setAttribute('stroke', '#ffd700'); bg.setAttribute('stroke-width', '3');
        svg.appendChild(bg);

        for (let i = 0; i < 12; i++) {
            const angle = (i * 30 - 90) * Math.PI / 180;
            const x1 = cx + innerR * Math.cos(angle);
            const y1 = cy + innerR * Math.sin(angle);
            const x2 = cx + r * Math.cos(angle);
            const y2 = cy + r * Math.sin(angle);

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1); line.setAttribute('y1', y1);
            line.setAttribute('x2', x2); line.setAttribute('y2', y2);
            line.setAttribute('stroke', '#444'); line.setAttribute('stroke-width', '1');
            svg.appendChild(line);
        }

        const innerCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        innerCircle.setAttribute('cx', cx); innerCircle.setAttribute('cy', cy); innerCircle.setAttribute('r', innerR);
        innerCircle.setAttribute('fill', 'none'); innerCircle.setAttribute('stroke', '#ffd700'); innerCircle.setAttribute('stroke-width', '2');
        svg.appendChild(innerCircle);

        for (let i = 0; i < 12; i++) {
            const angle = (i * 30 + 15 - 90) * Math.PI / 180;
            const tx = cx + (r - 25) * Math.cos(angle);
            const ty = cy + (r - 25) * Math.sin(angle);

            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', tx); text.setAttribute('y', ty);
            text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
            text.setAttribute('fill', '#ffd700'); text.setAttribute('font-size', '20');
            text.textContent = SIGN_SYMBOLS[i];
            svg.appendChild(text);
        }

        for (let i = 0; i < 12; i++) {
            const angle = (i * 30 + 15 - 90) * Math.PI / 180;
            const hx = cx + (innerR + 15) * Math.cos(angle);
            const hy = cy + (innerR + 15) * Math.sin(angle);

            const houseNum = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            houseNum.setAttribute('x', hx); houseNum.setAttribute('y', hy);
            houseNum.setAttribute('text-anchor', 'middle'); houseNum.setAttribute('dominant-baseline', 'middle');
            houseNum.setAttribute('fill', '#aaa'); houseNum.setAttribute('font-size', '12');
            houseNum.textContent = (i + 1).toString();
            svg.appendChild(houseNum);
        }

        planets.forEach((p, idx) => {
            const angle = (p.longitude - 90) * Math.PI / 180;
            const px = cx + (innerR - 30 - idx * 25) * Math.cos(angle);
            const py = cy + (innerR - 30 - idx * 25) * Math.sin(angle);

            const planetCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            planetCircle.setAttribute('cx', px); planetCircle.setAttribute('cy', py); planetCircle.setAttribute('r', '18');
            planetCircle.setAttribute('fill', '#1a1a2e'); planetCircle.setAttribute('stroke', '#ffd700'); planetCircle.setAttribute('stroke-width', '2');
            svg.appendChild(planetCircle);

            const planetText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            planetText.setAttribute('x', px); planetText.setAttribute('y', py);
            planetText.setAttribute('text-anchor', 'middle'); planetText.setAttribute('dominant-baseline', 'middle');
            planetText.setAttribute('fill', '#ffd700'); planetText.setAttribute('font-size', '16');
            planetText.textContent = PLANET_SYMBOLS[p.name] || p.name[0];
            svg.appendChild(planetText);

            const guideLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            guideLine.setAttribute('x1', cx); guideLine.setAttribute('y1', cy);
            guideLine.setAttribute('x2', px); guideLine.setAttribute('y2', py);
            guideLine.setAttribute('stroke', 'rgba(255,215,0,0.3)'); guideLine.setAttribute('stroke-width', '1');
            guideLine.setAttribute('stroke-dasharray', '4,4');
            svg.insertBefore(guideLine, svg.firstChild.nextSibling);
        });
    }

    document.getElementById('chartForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const errorDiv = document.getElementById('error');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');

        errorDiv.style.display = 'none';
        resultDiv.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'جاري الحساب...';

        try {
            const name = document.getElementById('name').value.trim();
            const dateInput = document.getElementById('date').value;
            const timeInput = document.getElementById('time').value;
            const cityData = document.getElementById('city').value.split(',');

            if (!dateInput || !timeInput) {
                throw new Error("يرجى إدخال التاريخ والوقت بشكل صحيح.");
            }

            const lat = parseFloat(cityData[0]);
            const lng = parseFloat(cityData[1]);
            const cityName = cityData[2];

            const [year, month, day] = dateInput.split('-').map(Number);
            const [hour, minute] = timeInput.split(':').map(Number);

            if (isNaN(year) || isNaN(month) || isNaN(day) || isNaN(hour) || isNaN(minute)) {
                throw new Error("تنسيق التاريخ أو الوقت غير صالح.");
            }

            const date = new Date(Date.UTC(year, month - 1, day, hour, minute, 0));

            if (isNaN(date.getTime())) {
                throw new Error("التاريخ المدخل غير صالح.");
            }

            const observer = new Astronomy.Observer(lat, lng, 0);

            const bodies = [
                { body: Astronomy.Body.Sun, name: 'Sun', ar: 'الشمس', emoji: '☀️' },
                { body: Astronomy.Body.Moon, name: 'Moon', ar: 'القمر', emoji: '🌙' },
                { body: Astronomy.Body.Mercury, name: 'Mercury', ar: 'عطارد', emoji: '☿️' },
                { body: Astronomy.Body.Venus, name: 'Venus', ar: 'الزهرة', emoji: '♀️' },
                { body: Astronomy.Body.Mars, name: 'Mars', ar: 'المريخ', emoji: '♂️' },
                { body: Astronomy.Body.Jupiter, name: 'Jupiter', ar: 'المشتري', emoji: '♃' },
                { body: Astronomy.Body.Saturn, name: 'Saturn', ar: 'زحل', emoji: '♄' }
            ];

            const planetResults = [];
            let detailsHTML = '';

            bodies.forEach(b => {
                const eq = Astronomy.Equator(b.body, date, observer, true, true);
                const ecl = Astronomy.Ecliptic(eq);
                const info = getSignInfo(ecl.elon);

                planetResults.push({
                    name: b.name,
                    longitude: ecl.elon,
                    sign: info.name,
                    degree: info.degree
                });

                detailsHTML += `
                    <div class="planet-info">
                        <strong>${b.emoji} ${b.ar}:</strong> برج ${info.name} (الدرجة ${info.degree}°)
                    </div>
                `;
            });

            document.getElementById('resultName').textContent = `خارطة ${name} - ${cityName}`;
            document.getElementById('planetDetails').innerHTML = detailsHTML + `
                <p style="color: #ccc; font-size: 0.9em; margin-top: 15px;">
                    * تم الحساب بنجاح باستخدام خوارزميات NASA الفلكية الدقيقة.
                </p>
            `;

            drawAstroChart(planetResults);

            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth' });

        } catch (err) {
            console.error(err);
            errorDiv.textContent = '⚠️ ' + err.message;
            errorDiv.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'احسب الخارطة الفلكية';
        }
    });
</script>

</body>
</html>
